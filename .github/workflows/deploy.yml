name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tools/brief-editor/package-lock.json

      - name: Build brief editor
        run: |
          cd tools/brief-editor
          npm ci
          npm run build

      - name: Compose site
        run: |
          mkdir -p _site
          cp -r example-templates/. _site/
          mkdir -p _site/brief-editor
          cp -r tools/brief-editor/dist/. _site/brief-editor/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
